<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise! ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="fx-container"></div>
    <div id="sparkle-layer"></div>

    <div class="music-control-container">
        <div id="mini-menu" class="mini-music-menu">
            <p class="menu-header">Switch Mood 🎵</p>
            <div id="dynamic-song-list"></div>
        </div>
        <div class="disc-wrapper" onclick="toggleMiniMenu()">
            <img src="https://cdn-icons-png.flaticon.com/512/265/265674.png" id="spinning-disc" class="disc-img">
        </div>
    </div>

    <div id="gift-overlay" class="overlay hidden">
        <div class="overlay-content">
            <div id="gift-display"></div>
            <button class="cute-btn small" onclick="closeGift()">Go Back🌷</button>
        </div>
    </div>

    <div id="main-card" class="glass-card">
        <div class="header">
            <h2 id="title">HeHe Suprisee🤭✨</h2>
            <div id="quest-tag" class="hidden">Goal: Catch 5 Sparkles ✨</div>
        </div>

        <div id="content">
            <div id="step-0">
                <p class="dark-text">Enter The Special Date 🌸(MMDD) 🗝️</p>
                <input type="text" id="pw" placeholder="0000" maxlength="4" inputmode="numeric">
                <br><br>
                <button class="cute-btn" onclick="unlock()">Open with Love ❤️</button>
            </div>

            <div id="celebration" class="hidden">
                <p id="status" class="dark-text">Ye Jagah Thodi Dark Nahi Hai?? </p>
                
                <div id="music-screen" class="hidden">
                    <p class="dark-text">Thode Gaane Vagera Ho Jaae? 🎵</p>
                    <div class="gift-item music-opt" onclick="selectSong(this, 'KUKKAD😸', 'song1.mp3')">KUKKAD😸</div>
                    <div class="gift-item music-opt" onclick="selectSong(this, 'I WANNA BE YOURS🌸', 'song2.mp3')">I WANNA BE YOURS🌸</div>
                    <div class="gift-item music-opt" onclick="selectSong(this, 'TUM HO TOH🌷', 'song3.mp3')">TUM HO TOH🌷</div>
                    <div class="gift-item music-opt" onclick="selectSong(this, 'CHAUDARY🎀', 'song4.mp3')">CHAUDARY🎀</div>
                    
                    <button id="confirm-music" class="cute-btn small hidden" onclick="confirmMusic()">Confirm & Proceed ❤️</button>
                </div>

                <div id="stage"></div>
                
                <div id="meter-container" class="hidden">
                    <div id="meter-fill"></div>
                    <div id="heart-pulse">💖</div>
                </div>
            </div>
        </div>

        <div class="footer">
            <button id="next-btn" class="hidden cute-btn" onclick="next()">Turn on the lights 🕯️</button>
        </div>
    </div>

    <audio id="bg-music" loop="false"></audio>

    <script src="script.js"></script>
</body>
</html>
