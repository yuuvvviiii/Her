<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise! ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="fx-container"></div>
    <div id="sparkle-layer"></div>

    <div id="gift-overlay" class="overlay hidden">
        <div class="overlay-content">
            <div id="gift-display"></div>
            <button class="cute-btn small" onclick="closeGift()">Go Back🌷</button>
        </div>
    </div>

    <div id="main-card" class="glass-card">
        <div class="header">
            <h2 id="title">HeHe Suprisee🤭✨</h2>
            <div id="quest-tag" class="hidden">Goal: Catch 5 Sparkles ✨</div>
        </div>

        <div id="content">
            <div id="step-0">
                <p class="dark-text">Enter The Special Date 🌸(MMDD) 🗝️</p>
                <input type="text" id="pw" placeholder="0000" maxlength="4" inputmode="numeric">
                <br><br>
                <button class="cute-btn" onclick="unlock()">Open with Love ❤️</button>
            </div>

            <div id="celebration" class="hidden">
                <p id="status" class="dark-text">Ye Jagah Thodi Dark Nahi Hai?? </p>
                <div id="stage"></div>
                
                <div id="meter-container" class="hidden">
                    <div id="meter-fill"></div>
                    <div id="heart-pulse">💖</div>
                </div>
            </div>
        </div>

        <div class="footer">
            <button id="next-btn" class="hidden cute-btn" onclick="next()">Turn on the lights 🕯️</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
