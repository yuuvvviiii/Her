<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise! ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="fx-container"></div>
    <div id="sparkle-layer"></div>

    <div id="gift-overlay" class="overlay hidden">
        <div class="overlay-content">
            <div id="gift-display"></div>
            <button class="cute-btn small" onclick="closeGift()">Go Back🌷</button>
        </div>
    </div>

    <div id="main-card" class="glass-card">
        <div class="header">
            <h2 id="title">HeHe Suprisee🤭✨</h2>
            <div id="quest-tag" class="hidden">Goal: Catch 5 Sparkles ✨</div>
        </div>

        <div id="content">
            <div id="step-0">
                <p class="dark-text">Enter The Special Date 🌸(MMDD) 🗝️</p>
                <input type="text" id="pw" placeholder="0000" maxlength="4" inputmode="numeric">
                <br><br>
                <button class="cute-btn" onclick="unlock()">Open with Love ❤️</button>
            </div>

            <div id="celebration" class="hidden">
                <p id="status" class="dark-text">Ye Jagah Thodi Dark Nahi Hai?? </p>

                <div id="music-screen" class="hidden">
    <p class="dark-text">Thode Gaane Vagera Ho Jaae? 🎵</p>

    <div id="music-disc" onclick="toggleMusicMenu()">💿</div>

    <div id="music-menu" class="hidden">
        <div class="gift-item music-opt" onclick="selectSong(this, 'Song 1', 'song1.mp3')">KUKKAD 😸</div>
        <div class="gift-item music-opt" onclick="selectSong(this, 'Song 2', 'song2.mp3')">I WANNA BE YOURS 🌸</div>
        <div class="gift-item music-opt" onclick="selectSong(this, 'Song 3', 'song3.mp3')">TUM HO TOH 🌷</div>
        <div class="gift-item music-opt" onclick="selectSong(this, 'Song 4', 'song4.mp3')">CHAUDHARY 🎀</div>

        <div class="music-controls">
            <button type="button" onclick="playMusic()">▶️</button>
            <button type="button" onclick="pauseMusic()">⏸️</button>
            <button type="button" onclick="stopMusic()">⏹️</button>
        </div>
    </div>

    <button id="confirm-music" class="cute-btn small hidden" onclick="confirmMusic()">
        Confirm & Proceed ❤️
    </button>
                </div>

                <div id="stage"></div>

                <div id="meter-container" class="hidden">
                    <div id="meter-fill"></div>
                    <div id="heart-pulse">💖</div>
                </div>
            </div>
        </div>

        <div class="footer">
            <button id="next-btn" class="hidden cute-btn" onclick="next()">Turn on the lights 🕯️</button>
        </div>
    </div>

    <audio id="bg-music" loop></audio>

    <script src="script.js"></script>
</body>
</html>
